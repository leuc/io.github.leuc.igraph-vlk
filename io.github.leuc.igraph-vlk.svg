<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </radialGradient>

    <radialGradient id="nodeCyan" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="40%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#083344"/>
    </radialGradient>
    
    <radialGradient id="nodePurple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    
    <radialGradient id="nodeGreen" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="40%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>
    
    <radialGradient id="nodeOrange" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#431407"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#334155" stroke-width="6"/>
  
  <circle cx="256" cy="256" r="236" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08"/>

  <g stroke="#334155" stroke-width="1.5" opacity="0.4">
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="130" y1="130" x2="382" y2="382"/>
    <line x1="130" y1="382" x2="382" y2="130"/>
  </g>

  <g stroke-width="2.5" opacity="0.65" stroke-linecap="round">
    <line x1="180" y1="200" x2="256" y2="150" stroke="#06b6d4" />
    <line x1="256" y1="150" x2="320" y2="230" stroke="#a855f7" />
    <line x1="320" y1="230" x2="240" y2="330" stroke="#22c55e" />
    <line x1="240" y1="330" x2="180" y2="200" stroke="#06b6d4" />
    
    <line x1="256" y1="150" x2="240" y2="330" stroke="#a855f7" opacity="0.4" />
    <line x1="180" y1="200" x2="320" y2="230" stroke="#06b6d4" opacity="0.4" />

    <line x1="180" y1="200" x2="130" y2="280" stroke="#06b6d4" />
    <line x1="130" y1="280" x2="240" y2="330" stroke="#a855f7" />

    <line x1="320" y1="230" x2="380" y2="170" stroke="#f97316" />
    <line x1="256" y1="150" x2="380" y2="170" stroke="#f97316" />

    <line x1="240" y1="330" x2="350" y2="360" stroke="#22c55e" />
    <line x1="320" y1="230" x2="350" y2="360" stroke="#22c55e" />
  </g>

  <g filter="url(#glow)">
    <circle cx="180" cy="200" r="22" fill="url(#nodeCyan)" />
    <circle cx="130" cy="280" r="14" fill="url(#nodeCyan)" />
    
    <circle cx="256" cy="150" r="18" fill="url(#nodePurple)" />
    <circle cx="320" cy="230" r="24" fill="url(#nodePurple)" />
    
    <circle cx="240" cy="330" r="26" fill="url(#nodeGreen)" />
    <circle cx="350" cy="360" r="16" fill="url(#nodeGreen)" />
    
    <circle cx="380" cy="170" r="15" fill="url(#nodeOrange)" />
  </g>
</svg>
